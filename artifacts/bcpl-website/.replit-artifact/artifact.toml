kind = "web"
previewPath = "/bcpl-website/"
title = "BCPL T20 Website"
version = "1.0.0"
id = "artifacts/bcpl-website"
router = "path"

[[services]]
name = "web"
paths = [ "/bcpl-website/" ]
localPort = 20570

# Development: inline PORT and BASE_PATH so they never bleed into production
[services.development]
run = "PORT=20570 BASE_PATH=/bcpl-website/ pnpm --filter @workspace/bcpl-website run dev"

# Production build: BASE_PATH=/ so asset URLs resolve at the domain root
[services.production.build]
args = ["pnpm", "--filter", "@workspace/bcpl-website", "run", "build"]

[services.production.build.env]
BASE_PATH = "/"

# Production run: node directly (same pattern as api-server) — bypasses pnpm
# which can break after pnpm store prune in the build container.
[services.production.run]
args = ["node", "artifacts/bcpl-website/server.mjs"]

[services.production.run.env]
PORT = "20570"

# SPA fallback: all routes → index.html
[[services.production.rewrites]]
from = "/*"
to = "/index.html"

# Explicit health check path for the startup probe
[services.production.health.startup]
path = "/"
