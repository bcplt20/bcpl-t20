# ============================================================
# BCPL T20 — Nginx Configuration
# Copy to: /etc/nginx/sites-available/bcplt20
# Then: ln -s /etc/nginx/sites-available/bcplt20 /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name bcplt20.com www.bcplt20.com;

    # After SSL setup via certbot, this block auto-redirects to HTTPS
    # certbot --nginx -d bcplt20.com -d www.bcplt20.com

    # ── API Server ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # ── Frontend (static files) ─────────────────────────────
    location /bcpl-website/ {
        alias /home/ubuntu/app/artifacts/bcpl-website/dist/public/;
        try_files $uri $uri/ /bcpl-website/index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Root redirect to website ────────────────────────────
    location = / {
        return 301 /bcpl-website/;
    }

    # ── Health check ────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
