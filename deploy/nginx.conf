# ============================================================
# BCPL T20 — Nginx Configuration
#
# ⚠ IMPORTANT — the live file on EC2 has extra SSL lines added by
# certbot (listen 443, ssl_certificate …). Do NOT overwrite the live
# file with this one. The live file is patched incrementally by
# deploy/fix-nginx.sh (idempotent — safe to re-run any time):
#   [EDIT 1] "location /": try_files falls through to @app
#   [EDIT 2] "location @app" block (SEO meta injection via Express)
#   [EDIT 3] rate-limit zones (OTP/auth + payment flood shield)
#   [EDIT 4] /api/auth/ + /api/payment/ locations with limit_req
#   [EDIT 5] /assets/ long-cache (vite hashed filenames → immutable)
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Fresh setup: copy to /etc/nginx/sites-available/bcplt20
# SSL: sudo certbot --nginx -d bcplt20.com
# ============================================================

# ── Rate-limit zones (http context — this file is included inside http{}) ──
# Generous on purpose: mobile-carrier NAT means many legitimate users can
# share one IP (master prompt: never block users just for sharing an IP).
# App-level per-phone/per-IP caps in the API remain the precise control;
# these zones only stop raw floods from a single source.
limit_req_zone $binary_remote_addr zone=bcpl_auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=bcpl_pay:10m  rate=20r/s;
limit_req_log_level warn;

server {
    listen 80;
    server_name bcplt20.com www.bcplt20.com;

    # ── Auth APIs (OTP send/verify) — flood shield ──────────
    location /api/auth/ {
        limit_req          zone=bcpl_auth burst=30 nodelay;
        limit_req_status   429;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1M;
    }

    # ── Payment APIs — flood shield (Cashfree webhooks भी यहीं) ──
    location /api/payment/ {
        limit_req          zone=bcpl_pay burst=40 nodelay;
        limit_req_status   429;
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 1M;
    }

    # ── API Server (general) ────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    # ── Hashed build assets — cache 1 year (filenames change on deploy) ──
    location /assets/ {
        root    /home/ubuntu/app/artifacts/bcpl-website/dist/public;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Frontend SPA ────────────────────────────────────────
    # Real files (js/css/images) are served straight from disk.
    # ALL page requests — including "/" — fall through to the API
    # server (@app), which returns index.html with live SEO meta
    # tags injected. Do NOT add "$uri/" here: it would make nginx
    # serve the dist directory's index.html statically for "/",
    # bypassing meta injection on the home page.
    location / {
        root    /home/ubuntu/app/artifacts/bcpl-website/dist/public;
        try_files $uri @app;                # [EDIT 1] was: try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # [EDIT 2] add this whole block
    location @app {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
