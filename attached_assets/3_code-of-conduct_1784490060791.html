<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Code of Conduct in Team Dugouts — BCPL</title>
<style>
  :root { --navy:#0F2247; --orange:#FF7A29; --gold:#E8B23D; --ink:#0F2247; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system, 'Inter', Arial, sans-serif; background:#FFF8EF; color:var(--ink); line-height:1.75; }
  header { background:var(--navy); padding:22px 20px; text-align:center; }
  header a { color:#fff; text-decoration:none; font-weight:800; font-size:18px; letter-spacing:0.5px; }
  .wrap { max-width:780px; margin:0 auto; padding:32px 20px 60px; }
  h1 { font-size:26px; color:var(--navy); margin-bottom:6px; }
  .updated { font-size:12.5px; color:#888; margin-bottom:26px; }
  .intro { background:#fff; border-left:4px solid var(--orange); padding:14px 18px; border-radius:8px; font-size:14px; color:#444; margin-bottom:26px; }
  h2 { font-size:16px; color:var(--orange); margin-top:30px; }
  p, li { font-size:14px; color:#333; }
  ul { padding-left:20px; }
  li { margin-bottom:6px; }
  .penalty-table { width:100%; border-collapse:collapse; margin-top:14px; font-size:13.5px; }
  .penalty-table th, .penalty-table td { text-align:left; padding:10px 8px; border-bottom:1px solid #eee; }
  .penalty-table th { color:var(--navy); background:#F5F0E6; }
  a.back { display:inline-block; margin-top:34px; color:var(--orange); font-weight:700; text-decoration:none; }
  [data-hi] { display:none; }
  html.lang-hi [data-en] { display:none; }
  html.lang-hi [data-hi] { display:inline; }
  nav { background:var(--navy); padding:0; }
  nav .row { max-width:780px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:relative; }
  .menu-btn { display:flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:10px; background:rgba(255,255,255,0.08); border:none; color:#fff; font-size:20px; cursor:pointer; }
  .menu-btn:active { background:rgba(255,255,255,0.18); }
  .menu-dropdown { display:none; position:absolute; top:100%; right:20px; margin-top:8px; background:#fff; border-radius:14px; box-shadow:0 14px 34px rgba(0,0,0,0.22); padding:8px; min-width:210px; z-index:50; }
  .menu-dropdown.open { display:block; }
  .menu-dropdown a { display:flex; align-items:center; gap:8px; padding:11px 14px; border-radius:10px; color:var(--navy); font-weight:700; font-size:13.5px; text-decoration:none; }
  .menu-dropdown a:hover, .menu-dropdown a.active { background:rgba(255,85,0,0.08); }
  .menu-dropdown a.register-link { background:var(--orange); color:#fff; margin-top:4px; justify-content:center; }
  .menu-lang-row { display:flex; gap:6px; padding:4px 4px 10px; margin-bottom:6px; border-bottom:1px solid rgba(20,32,63,0.08); }
  .menu-lang-btn { flex:1; padding:9px 0; border-radius:9px; border:none; background:rgba(20,32,63,0.06); color:var(--navy); font-weight:800; font-size:13px; cursor:pointer; }
  .menu-lang-btn.active { background:var(--navy); color:#fff; }
  .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-40px); background:#1B7A3D; color:#fff; padding:12px 20px; border-radius:12px; font-size:13.5px; font-weight:700; box-shadow:0 10px 26px rgba(0,0,0,0.2); z-index:200; opacity:0; transition:opacity 0.25s ease, transform 0.25s ease; pointer-events:none; max-width:90vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 2800);
  }
  function menuLogout() {
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    renderMenuAuth();
    showToast(document.documentElement.className === 'lang-hi' ? 'आप सफलतापूर्वक लॉग आउट हो गए हैं।' : 'You have successfully logged out.');
  }
  renderMenuAuth();
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) renderMenuAuth();
  });
  function toggleMenu() {
    document.getElementById('menu-dropdown').classList.toggle('open');
  }
  document.addEventListener('click', function (e) {
    var dd = document.getElementById('menu-dropdown');
    var btn = document.querySelector('.menu-btn');
    if (dd && dd.classList.contains('open') && !dd.contains(e.target) && e.target !== btn) {
      dd.classList.remove('open');
    }
  });

  // CMS se content load karna
  fetch('https://bcpl-backend-production.up.railway.app/api/content/code-of-conduct')
    .then(function (res) { return res.ok ? res.json() : null; })
    .then(function (r) {
      if (!r || !r.success) {
        document.getElementById('page-content').innerHTML = '<p>Content load nahi ho paaya. Kripya baad mein try karein.</p>';
        return;
      }
      document.getElementById('page-title').textContent = r.page.title || '';
      document.getElementById('page-updated').textContent = 'Last updated: ' + new Date(r.page.updated_at).toLocaleDateString('en-IN', { year: 'numeric', month: 'long' });
      document.getElementById('page-content').innerHTML = r.page.content_html || '';
    })
    .catch(function () {
      document.getElementById('page-content').innerHTML = '<p>Content load nahi ho paaya.</p>';
    });
</script>
</body>
</html>
